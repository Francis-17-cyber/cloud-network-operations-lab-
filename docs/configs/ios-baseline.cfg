! Baseline Enterprise Router Configuration
hostname Core-Router-01
!
no ip domain lookup
ip domain name lab.local
!
! Secure the Management Console
line con 0
 logging synchronous
 history size 15
 exec-timeout 15 0
!
! Configure local interface to match our On-Prem IP plan
interface GigabitEthernet1
 description Local On-Prem Sandbox Gateway
 ip address 192.168.10.1 255.255.255.0
 no shutdown
!
end! Baseline Enterprise Router Configuration
